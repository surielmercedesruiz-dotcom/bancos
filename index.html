  <!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Serif - Canva Embed con Botones</title>
  <style>
    .canva-bank-wrapper {
      position: relative;
      width: 100%;
      height: 0;
      padding-top: 129.4118%;
      padding-bottom: 0;
      box-shadow: 0 2px 8px 0 rgba(63, 69, 81, 0.16);
      margin-top: 1.6em;
      margin-bottom: 0.9em;
      overflow: hidden;
      border-radius: 8px;
      will-change: transform;
    }

    .canva-bank-wrapper iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      border: none;
      padding: 0;
      margin: 0;
    }

    .bank-button {
      position: absolute;
      z-index: 2;
      display: block;
      border-radius: 3px;
      outline-offset: 4px;
    }

    .bank-button:hover {
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.45);
    }

    .bank-button:focus-visible {
      outline: 3px solid #fff;
      box-shadow: 0 0 0 5px #0a84ff;
    }

    .bank-chase {
      left: 6.54%;
      top: 19.56%;
      width: 88.28%;
      height: 10.51%;
    }

    .bank-wells-fargo {
      left: 6.54%;
      top: 32.37%;
      width: 88.09%;
      height: 10.81%;
    }

    .bank-bank-of-america {
      left: 6.41%;
      top: 45.47%;
      width: 88.16%;
      height: 10.46%;
    }

    .bank-usaa {
      left: 6.60%;
      top: 58.28%;
      width: 87.77%;
      height: 10.46%;
    }

    .bank-td-bank {
      left: 5.95%;
      top: 71.14%;
      width: 88.09%;
      height: 11.21%;
    }

    .bank-capital-one {
      left: 6.47%;
      top: 84.49%;
      width: 88.22%;
      height: 10.61%;
    }
  </style>
</head>
<body>
  <div class="canva-bank-wrapper">
    <iframe
      loading="lazy"
      src="https://www.canva.com/design/DAHMmdxxR_Q/vHsN8LPBO3MvhypenVm31Q/view?embed"
      allowfullscreen="allowfullscreen"
      allow="fullscreen">
    </iframe>

    <a class="bank-button bank-chase" href="https://www.youtube.com/watch?v=TF2mIYy32CE&list=RDV0bdTzb0noQ&index=5" target="_blank" rel="noopener noreferrer" aria-label="Chase" title="Chase"></a>
    <a class="bank-button bank-wells-fargo" href="https://www.youtube.com/watch?v=TF2mIYy32CE&list=RDV0bdTzb0noQ&index=5" target="_blank" rel="noopener noreferrer" aria-label="Wells Fargo" title="Wells Fargo"></a>
    <a class="bank-button bank-bank-of-america" href="https://www.youtube.com/watch?v=QOcY02xOtMw&list=RDV0bdTzb0noQ&index=6" target="_blank" rel="noopener noreferrer" aria-label="Bank of America" title="Bank of America"></a>
    <a class="bank-button bank-usaa" href="https://www.youtube.com/watch?v=QOcY02xOtMw&list=RDV0bdTzb0noQ&index=6" target="_blank" rel="noopener noreferrer" aria-label="USAA" title="USAA"></a>
    <a class="bank-button bank-td-bank" href="https://www.youtube.com/watch?v=QOcY02xOtMw&list=RDV0bdTzb0noQ&index=6" target="_blank" rel="noopener noreferrer" aria-label="TD Bank" title="TD Bank"></a>
    <a class="bank-button bank-capital-one" href="https://www.youtube.com/watch?v=QOcY02xOtMw&list=RDV0bdTzb0noQ&index=6" target="_blank" rel="noopener noreferrer" aria-label="Capital One" title="Capital One"></a>
